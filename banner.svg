<!-- SUBTITLE -->
<text x="450" y="172"
      font-family="'Courier New',Courier,monospace"
      font-size="13"
      fill="#8b949e"
      text-anchor="middle"
      letter-spacing="4.5">ASPIRING AI ENGINEER  ·  FULL STACK DEVELOPER</text>

<!-- SUBTITLE FLANKING DECO -->
