<!-- CIRCUIT TRACES LEFT -->
<g stroke="#00d4ff" fill="none" stroke-width=".75" opacity=".2" clip-path="url(#lcl)">
  <path d="M0,86 H62 L84,64 H210"/>
  <path d="M0,146 H42 L64,124 H215"/>
  <path d="M0,194 H48 L70,172 H185 L205,152"/>
