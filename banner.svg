<svg width="900" height="300" viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg">
<style>
  .hl{animation:hA 5s ease-in-out infinite}
  .cd{animation:cA 4s ease-in-out infinite}
  @keyframes hA{0%,100%{opacity:.2}50%{opacity:.45}}
  @keyframes cA{0%,100%{opacity:.55;r:3}50%{opacity:1;r:4}}
</style>
<defs>
  <linearGradient id="cg" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%"   stop-color="#131827"/>
    <stop offset="55%"  stop-color="#0d1020"/>
    <stop offset="100%" stop-color="#07070d"/>
  </linearGradient>
  <radialGradient id="tl" cx="6%" cy="8%" r="48%">
    <stop offset="0%"   stop-color="#ffffff" stop-opacity=".065"/>
    <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="rj" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%"  stop-color="#607a90"/>
    <stop offset="100%" stop-color="#80a8c0"/>
  </linearGradient>
  <radialGradient id="hl" cx="50%" cy="50%" r="50%">
    <stop offset="45%"  stop-color="#181d50" stop-opacity="0"/>
    <stop offset="78%"  stop-color="#181d50" stop-opacity=".28"/>
    <stop offset="100%" stop-color="#181d50" stop-opacity="0"/>
  </radialGradient>
  <!-- Edge highlight: a faint radial glow used for key lines -->
  <filter id="eg" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="3" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="cg2" x="-100%" y="-100%" width="300%" height="300%">
    <feGaussianBlur stdDeviation="6" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <clipPath id="cc">
    <rect x="16" y="14" width="868" height="272" rx="22" ry="22"/>
  </clipPath>
</defs>

<!-- OUTER BG -->
<rect width="900" height="300" fill="#05050b"/>

<!-- CARD -->
<rect x="16" y="14" width="868" height="272" rx="22" ry="22" fill="url(#cg)"/>
<rect x="16" y="14" width="868" height="272" rx="22" ry="22" fill="url(#tl)"/>
<rect x="16" y="14" width="868" height="272" rx="22" ry="22"
      fill="none" stroke="rgba(255,255,255,0.09)" stroke-width="1.2"/>

<!-- ── LEFT TEXT ── -->
<text x="58" y="118"
      font-family="Impact,'Arial Black',sans-serif"
      font-size="80" fill="#ededf5" letter-spacing="3">PUNEETH</text>

<text x="58" y="200"
      font-family="Impact,'Arial Black',sans-serif"
      font-size="80" fill="url(#rj)" letter-spacing="3">RAJ</text>

<text x="60" y="242"
      font-family="'Helvetica Neue',Helvetica,Arial,sans-serif"
      font-size="14" fill="#3e4058" letter-spacing=".5">Aspiring AI Engineer · Full Stack Developer</text>

<!-- ── CRYSTAL RIGHT ── -->
<g clip-path="url(#cc)">

  <!-- Diffuse ambient glow (behind everything) -->
  <circle cx="660" cy="150" r="158" fill="url(#hl)" class="hl"/>

  <!-- ── OUTER HEXAGON + SPOKES (slow CW) ── -->
  <g stroke="rgba(200,210,230,0.22)" stroke-width="1" fill="rgba(255,255,255,0.012)">
    <animateTransform attributeName="transform" type="rotate"
      from="0 660 150" to="360 660 150" dur="30s" repeatCount="indefinite"/>
    <!-- Outer hexagon vertices (radius 108) -->
    <!-- v0(top)=(660,42) v1(tr)=(755,96) v2(br)=(755,204) v3(bot)=(660,258) v4(bl)=(565,204) v5(tl)=(565,96) -->
    <polygon points="660,42 755,96 755,204 660,258 565,204 565,96"/>
    <!-- 6 radial spokes to center -->
    <line x1="660" y1="42"  x2="660" y2="150"/>
    <line x1="755" y1="96"  x2="660" y2="150"/>
    <line x1="755" y1="204" x2="660" y2="150"/>
    <line x1="660" y1="258" x2="660" y2="150"/>
    <line x1="565" y1="204" x2="660" y2="150"/>
    <line x1="565" y1="96"  x2="660" y2="150"/>
  </g>

  <!-- ── INNER HEXAGON + SPOKES (faster CCW, brighter) ── -->
  <g stroke="rgba(210,225,245,0.38)" stroke-width="1.2" fill="rgba(255,255,255,0.018)">
    <animateTransform attributeName="transform" type="rotate"
      from="30 660 150" to="-330 660 150" dur="18s" repeatCount="indefinite"/>
    <!-- Inner hexagon (radius 54, starts rotated 30° from outer) -->
    <!-- v0=(660,96) v1=(707,123) v2=(707,177) v3=(660,204) v4=(613,177) v5=(613,123) -->
    <polygon points="660,96 707,123 707,177 660,204 613,177 613,123"/>
    <line x1="660" y1="96"  x2="660" y2="150"/>
    <line x1="707" y1="123" x2="660" y2="150"/>
    <line x1="707" y1="177" x2="660" y2="150"/>
    <line x1="660" y1="204" x2="660" y2="150"/>
    <line x1="613" y1="177" x2="660" y2="150"/>
    <line x1="613" y1="123" x2="660" y2="150"/>
  </g>

  <!-- ── THIRD RING (smallest, CW, different speed — adds depth) ── -->
  <g stroke="rgba(180,200,225,0.5)" stroke-width="0.8" fill="none">
    <animateTransform attributeName="transform" type="rotate"
      from="15 660 150" to="375 660 150" dur="11s" repeatCount="indefinite"/>
    <!-- Tiny hexagon, radius 27 -->
    <polygon points="660,123 683,136 683,164 660,177 637,164 637,136"/>
  </g>

  <!-- ── ORBITING SHARD 1 (triangle, orbit r=138, 15s CW) ── -->
  <g>
    <animateTransform attributeName="transform" type="rotate"
      from="0 660 150" to="360 660 150" dur="15s" repeatCount="indefinite"/>
    <polygon points="660,12 674,32 646,32"
             fill="rgba(255,255,255,0.04)" stroke="rgba(220,230,245,0.55)" stroke-width="0.9"/>
  </g>

  <!-- ── ORBITING SHARD 2 (triangle, orbit r=128, 23s CCW, starts 120°) ── -->
  <g>
    <animateTransform attributeName="transform" type="rotate"
      from="120 660 150" to="-240 660 150" dur="23s" repeatCount="indefinite"/>
    <polygon points="660,22 672,38 648,38"
             fill="rgba(255,255,255,0.03)" stroke="rgba(200,220,240,0.45)" stroke-width="0.8"/>
  </g>

  <!-- ── ORBITING SHARD 3 (tiny, orbit r=148, 19s CW, starts 240°) ── -->
  <g>
    <animateTransform attributeName="transform" type="rotate"
      from="240 660 150" to="600 660 150" dur="19s" repeatCount="indefinite"/>
    <polygon points="660,2 670,18 650,18"
             fill="rgba(255,255,255,0.03)" stroke="rgba(190,210,235,0.4)" stroke-width="0.7"/>
  </g>

  <!-- ── CENTER DOT ── -->
  <circle cx="660" cy="150" r="3" fill="rgba(255,255,255,0.7)" filter="url(#cg2)" class="cd"/>

</g>

<!-- CARD BORDER REDRAW (sharp, on top of clip) -->
<rect x="16" y="14" width="868" height="272" rx="22" ry="22"
      fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
</svg>
