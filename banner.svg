<svg width="900" height="260" viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg">
<style>
  .n{animation:np 2s ease-in-out infinite}
  .n2{animation:np 2.6s ease-in-out infinite;animation-delay:.6s}
  .n3{animation:np 1.9s ease-in-out infinite;animation-delay:1.1s}
  .gt{animation:glitch 8s ease-in-out infinite}
  .sl{animation:scan 5s linear infinite}
  .df{animation:dflow 9s linear infinite}
  .df2{animation:dflow 13s linear infinite;animation-delay:-5s}
  .df3{animation:dflow 11s linear infinite;animation-delay:-8s}
  .bp{animation:bpulse 1.9s ease-in-out infinite}
  .rp{animation:bpulse 1.9s ease-in-out infinite;animation-delay:.95s}
  @keyframes np{0%,100%{opacity:.15}50%{opacity:1}}
  @keyframes glitch{
    0%,78%,100%{transform:translate(0,0);opacity:1}
    79%{transform:translate(-3px,0);opacity:.9}
    80%{transform:translate(3px,0);opacity:.85}
    81%{transform:translate(0,0);opacity:1}
    88%{transform:translate(-2px,1px);opacity:.9}
    89%{transform:translate(2px,-1px);opacity:1}
    90%{transform:translate(0,0)}
  }
  @keyframes scan{0%{transform:translateY(-90px)}100%{transform:translateY(350px)}}
  @keyframes dflow{0%{transform:translateX(-320px)}100%{transform:translateX(1220px)}}
  @keyframes bpulse{0%,100%{opacity:.45}50%{opacity:1}}
  @keyframes dot{0%,100%{opacity:.08}50%{opacity:.25}}
</style>
<defs>
  <radialGradient id="bg" cx="50%" cy="42%" r="78%">
    <stop offset="0%" stop-color="#0d1c30"/>
    <stop offset="45%" stop-color="#07101e"/>
    <stop offset="100%" stop-color="#020409"/>
  </radialGradient>
  <radialGradient id="aL" cx="12%" cy="52%" r="38%">
    <stop offset="0%" stop-color="#7c3aed" stop-opacity=".2"/>
    <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="aR" cx="88%" cy="52%" r="38%">
    <stop offset="0%" stop-color="#00d4ff" stop-opacity=".13"/>
    <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="aC" cx="50%" cy="54%" r="28%">
    <stop offset="0%" stop-color="#00d4ff" stop-opacity=".05"/>
    <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="tg" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#9d50e8"/>
    <stop offset="30%" stop-color="#00d4ff"/>
    <stop offset="55%" stop-color="#00eaff"/>
    <stop offset="80%" stop-color="#00d4ff"/>
    <stop offset="100%" stop-color="#9d50e8"/>
  </linearGradient>
  <linearGradient id="sg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#00d4ff" stop-opacity="0"/>
    <stop offset="50%" stop-color="#00d4ff" stop-opacity=".055"/>
    <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="dfg" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#00d4ff" stop-opacity="0"/>
    <stop offset="25%" stop-color="#00d4ff" stop-opacity=".55"/>
    <stop offset="75%" stop-color="#00d4ff" stop-opacity=".55"/>
    <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="dfg2" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#7c3aed" stop-opacity="0"/>
    <stop offset="25%" stop-color="#7c3aed" stop-opacity=".45"/>
    <stop offset="75%" stop-color="#7c3aed" stop-opacity=".45"/>
    <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="ll" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#00d4ff" stop-opacity="0"/>
    <stop offset="100%" stop-color="#00d4ff" stop-opacity=".85"/>
  </linearGradient>
  <linearGradient id="lr" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#00d4ff" stop-opacity=".85"/>
    <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
  </linearGradient>
  <pattern id="hex" x="0" y="0" width="22" height="19.05" patternUnits="userSpaceOnUse">
    <polygon points="11,0 22,5.5 22,13.55 11,19.05 0,13.55 0,5.5" fill="none" stroke="#00d4ff" stroke-width=".35"/>
  </pattern>
  <filter id="tglow" x="-18%" y="-60%" width="136%" height="220%">
    <feGaussianBlur stdDeviation="10" result="b1"/>
    <feGaussianBlur stdDeviation="5" result="b2" in="SourceGraphic"/>
    <feMerge>
      <feMergeNode in="b1"/>
      <feMergeNode in="b1"/>
      <feMergeNode in="b2"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
  <filter id="ng" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur stdDeviation="3.5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="lg" x="-8%" y="-60%" width="116%" height="220%">
    <feGaussianBlur stdDeviation="2" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <clipPath id="clip"><rect width="900" height="260"/></clipPath>
  <clipPath id="lcl"><rect x="0" y="0" width="230" height="260"/></clipPath>
  <clipPath id="rcl"><rect x="670" y="0" width="230" height="260"/></clipPath>
</defs>

<!-- BG -->
<rect width="900" height="260" fill="url(#bg)"/>
<rect width="900" height="260" fill="url(#aL)"/>
<rect width="900" height="260" fill="url(#aR)"/>
<rect width="900" height="260" fill="url(#aC)"/>

