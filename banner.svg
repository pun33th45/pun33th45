<!-- MAIN TITLE - IMPACT FONT + GRADIENT + GLOW + GLITCH -->
<text x="450" y="132"
      font-family="Impact,'Arial Black',sans-serif"
      font-size="74"
      fill="url(#tg)"
      text-anchor="middle"
      letter-spacing="11"
      filter="url(#tglow)"
