<text x="682" y="244" font-family="'Courier New',Courier,monospace" font-size="7.5" fill="#8b949e" opacity=".5" letter-spacing="1">OPEN_TO_COLLABORATE</text>

<!-- AMBIENT TITLE GLOW (behind text) -->
